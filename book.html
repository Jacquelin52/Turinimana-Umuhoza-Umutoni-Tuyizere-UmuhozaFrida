<!DOCTYPE html>
<html>
<head>
    <title>Book Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 400px;
            background: white;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Book Registration</h2>

    <input type="text" id="bookId" placeholder="Book ID">
    <input type="text" id="title" placeholder="Book Title">
    <input type="text" id="author" placeholder="Author Name">
    <textarea id="description" placeholder="Book Description"></textarea>

    <button onclick="registerBook()">Register Book</button>

    <table id="bookTable">
        <tr>
            <th>Book ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Description</th>
        </tr>
    </table>
</div>

<script>
    function registerBook() {
        let bookId = document.getElementById("bookId").value;
        let title = document.getElementById("title").value;
        let author = document.getElementById("author").value;
        let description = document.getElementById("description").value;

        if(bookId === "" || title === "" || author === "" || description === "") {
            alert("Please fill all fields");
            return;
        }

        let table = document.getElementById("bookTable");

        let row = table.insertRow();

        row.insertCell(0).innerHTML = bookId;
        row.insertCell(1).innerHTML = title;
        row.insertCell(2).innerHTML = author;
        row.insertCell(3).innerHTML = description;

        // Clear inputs
        document.getElementById("bookId").value = "";
        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("description").value = "";
    }
</script>

</body>
</html>
